<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartInfra — Lei Wang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1115;
      --surface: #161922;
      --text: #f3f5f9;
      --text-muted: #a2a8b8;
      --accent: #3b82f6;
      --accent-2: #8b5cf6;
      --border: rgba(255,255,255,0.08);
      --code-bg: #1e212b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav {
      border-bottom: 1px solid var(--border);
      background: rgba(15,17,21,0.85);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
    }

    .nav-inner {
      max-width: 820px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-inner a.back {
      color: var(--text-muted);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-inner a.back:hover { color: var(--text); }

    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 56px 24px 100px;
    }

    #content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px;
    }

    @media (max-width: 640px) {
      #content { padding: 28px; }
    }

    #content h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    #content .meta {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    #content h2 {
      font-size: 1.45rem;
      font-weight: 700;
      margin-top: 44px;
      margin-bottom: 16px;
      letter-spacing: -0.01em;
    }

    #content h3 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-top: 28px;
      margin-bottom: 12px;
    }

    #content p {
      margin-bottom: 16px;
      color: #d1d5e0;
    }

    #content ul, #content ol {
      margin-bottom: 20px;
      padding-left: 22px;
      color: #d1d5e0;
    }

    #content li {
      margin-bottom: 8px;
    }

    #content code {
      background: var(--code-bg);
      padding: 2px 7px;
      border-radius: 6px;
      font-family: 'SF Mono', Monaco, Inconsolata, monospace;
      font-size: 0.9em;
      color: #93c5fd;
    }

    #content pre {
      background: var(--code-bg);
      padding: 20px;
      border-radius: 12px;
      overflow-x: auto;
      margin-bottom: 24px;
      border: 1px solid var(--border);
    }

    #content pre code {
      background: transparent;
      padding: 0;
      color: #e2e8f0;
      font-size: 0.85rem;
      line-height: 1.6;
    }

    #content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24px;
      font-size: 0.95rem;
    }

    #content th, #content td {
      padding: 12px 14px;
      border: 1px solid var(--border);
      text-align: left;
    }

    #content th {
      background: var(--code-bg);
      font-weight: 600;
    }

    #content td {
      color: #d1d5e0;
    }

    #content hr {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 36px 0;
    }

    #content strong {
      color: var(--text);
      font-weight: 600;
    }

    footer {
      text-align: center;
      padding: 40px 0 60px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .loading {
      color: var(--text-muted);
      text-align: center;
      padding: 60px 0;
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="../index.html" class="back">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
        Back to Home
      </a>
      <span style="font-weight: 600;">Blog</span>
    </div>
  </nav>

  <main class="container">
    <article id="content">
      <div class="loading">Loading article...</div>
    </article>
  </main>

  <footer>
    <p>© Lei Wang · Written for the SmartInfra project.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    fetch('smartinfra.md')
      .then(res => {
        if (!res.ok) throw new Error('Failed to load article');
        return res.text();
      })
      .then(md => {
        const html = marked.parse(md);
        document.getElementById('content').innerHTML = html;
      })
      .catch(err => {
        document.getElementById('content').innerHTML = '<p style="color:#f87171">' + err.message + '</p>';
      });
  </script>
</body>
</html>
